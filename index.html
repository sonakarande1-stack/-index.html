<!DOCTYPE html>
<html lang="en">
<head><centre>happiest b'day dear one</centre><head>
<meta charset="UTF-8">
<title>Birthday Experience</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #f1f5f9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* POPUP */
.popup {
  display: none;
  background: rgba(30, 41, 59, 0.95);
  padding: 40px;
  border-radius: 16px;
  text-align: center;
  width: 380px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  animation: fadeIn 0.6s ease;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: #6366f1;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* CAKE */
.cake {
  position: relative;
  margin: 20px auto;
  width: 120px;
  height: 120px;
}

.layer {
  position: absolute;
  width: 100%;
  height: 40px;
  border-radius: 10px;
}

.layer1 { bottom: 0; background: #f472b6; }
.layer2 { bottom: 40px; background: #fb7185; }
.layer3 { bottom: 80px; background: #facc15; }

.candle {
  position: absolute;
  top: -20px;
  left: 50%;
  width: 6px;
  height: 20px;
  background: white;
  transform: translateX(-50%);
}

.flame {
  position: absolute;
  top: -10px;
  left: 50%;
  width: 10px;
  height: 10px;
  background: orange;
  border-radius: 50%;
  transform: translateX(-50%);
  animation: flicker 0.3s infinite alternate;
}

@keyframes flicker {
  from {transform: translateX(-50%) scale(1);}
  to {transform: translateX(-50%) scale(1.2);}
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.box {
  width: 40px;
  height: 40px;
  background: #334155;
  border-radius: 8px;
  cursor: pointer;
}

/* CARD */
.card {
  width: 100%;
  background: #1e293b;
  border-radius: 12px;
  padding: 10px;
  margin-top: 10px;
  display: flex;
  gap: 10px;
  align-items: center;
  animation: pop 0.4s ease;
}

.card img {
  width: 50px;
  height: 50px;
  border-radius: 8px;
  object-fit: cover;
}

@keyframes pop {
  from {transform: scale(0.9); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

.win {
  margin-top: 15px;
  color: #22c55e;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- STEP 1 -->
<div id="step1" class="popup">
  <h1>Happy Birthday</h1>

  <div class="cake">
    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>
    <div class="candle"></div>
    <div class="flame"></div>
  </div>

  <p>Take a quiet moment.</p>
  <button onclick="next('step2')">Continue</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="popup">
  <h2>Your Age</h2>
  <h1 id="age">0</h1>
  <h3>cheers for 18 yrs survival</h3>
  <button onclick="next('step3')">Continue</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="popup">
  <h2>A Message</h2>
  <p id="giftText"></p>
  <button onclick="next('step4')">Enter Experience</button>
</div>

<!-- STEP 4 GAME -->
<div id="step4" class="popup">
  <h2>Find 5 Gifts</h2>

  <div class="grid" id="grid"></div>

  <p id="score">0 / 5</p>
  <div id="msg"></div>
  <div class="win" id="win"></div>
</div>

<script>
function show(id){ document.getElementById(id).style.display="block"; }
function hide(){ document.querySelectorAll(".popup").forEach(p=>p.style.display="none"); }
function next(id){ hide(); show(id); }

show("step1");

/* AGE */
let age = 18;
let i = 0;
setInterval(()=>{
  if(i<=age){
    document.getElementById("age").innerText = i;
    i++;
  }
},80);

/* MESSAGE */
document.getElementById("giftText").innerText =
"Some people don’t need loud celebrations — just quiet appreciation.";

/* DATA */
let gifts = [
 {n:"Lipstick", img:"https://images.unsplash.com/photo-1596462502278-27bfdc403348"},
 {n:"Perfume", img:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},
 {n:"Ring", img:"https://images.unsplash.com/photo-1605100804763-247f67b3557e"},
 {n:"Handbag", img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},
 {n:"Skincare", img:"https://images.unsplash.com/photo-1612810436541-336d8a8d7f6a"}
];

let wishes = [
 "You are becoming something rare.",
 "Soft energy suits you best.",
 "Everything is aligning quietly.",
 "You don’t need to rush life.",
 "Peace will find you."
];

let collected = 0;
let click = 0;

let grid = document.getElementById("grid");

for(let i=0;i<15;i++){
  let b=document.createElement("div");
  b.className="box";

  b.onclick=()=>{
    if(b.style.opacity=="0.3") return;

    b.style.opacity="0.3";
    click++;

    if(click % 2 === 1){
      collected++;

      let g = gifts[Math.floor(Math.random()*gifts.length)];

      document.getElementById("score").innerText = collected+" / 5";

      document.getElementById("msg").innerHTML =
      `<div class="card">
        <img src="${g.img}">
        <div>You received: ${g.n}</div>
      </div>`;

    } else {
      let w = wishes[Math.floor(Math.random()*wishes.length)];
      document.getElementById("msg").innerText = w;
    }

    if(collected === 5){
      document.getElementById("win").innerHTML =
      "✨ All gifts unlocked.<br>Some people deserve quiet, beautiful things.";
    }
  };

  grid.appendChild(b);
}
</script>

</body>
</html>
